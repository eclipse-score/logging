name: Daily

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  maintenance:
    uses: eclipse-score/cicd-workflows/.github/workflows/daily.yml@main
    permissions:
      contents: write
      issues: write
      pull-requests: write
      pages: write
      id-token: write
