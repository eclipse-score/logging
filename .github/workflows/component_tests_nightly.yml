name: Component Tests Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  component-tests-nightly:
    name: Run Component Tests Nightly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-version: 1.26.0
          # Per-workflow disk cache namespace; the action falls back to the
          # most recent cache via its built-in restore-keys prefix.
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          bazelisk-cache: true
          # Nightly runs (schedule/dispatch) save to seed the warm cache.
          cache-save: ${{ github.event_name != 'pull_request' }}

      - name: Run component tests
        run: |
          bazel test --lockfile_mode=error --config x86_64-linux \
            --test_tag_filters=integration \
            --test_output=errors \
            //score/test/component/...

    # QNX integration tests — requires a self-hosted runner with QEMU + tap0 bridge.
    # Enable once integration_tests.yml is available in cicd-workflows.
    # - name: Run QNX component tests
    #   uses: eclipse-score/cicd-workflows/.github/workflows/qnx-test.yml@main
    #   with:
    #     bazel-target: '//score/test/component/...'
    #     bazel-config: 'x86_64-qnx'
    #     test-tag-filters: 'integration'
