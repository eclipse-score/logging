name: Clang-Tidy

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.26.0
      - name: Run clang-tidy
        run: bazel test --config=clang-tidy --lockfile_mode=error //score/mw/...
