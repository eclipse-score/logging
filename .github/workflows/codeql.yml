name: CodeQL Static Analysis

on:
  pull_request:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  codeql-analysis:
    name: CodeQL MISRA/CERT C++ Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          packs: codeql/misra-cpp-coding-standards,codeql/cert-cpp-coding-standards
          trap-caching: false
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-version: 1.26.0
          repository-cache: true
          bazelisk-cache: true

      - name: Build with Bazel (CodeQL traces compiler calls)
        run: |
          bazel build \
            --lockfile_mode=error \
            --config x86_64-linux \
            --nouse_action_cache \
            --disk_cache= \
            --noremote_accept_cached \
            --noremote_upload_local_results \
            //...

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: cpp-misra-cert
          output: _sca
          upload: true

      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: _sca/
          retention-days: 30
